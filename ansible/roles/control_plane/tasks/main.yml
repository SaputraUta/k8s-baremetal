---
- name: Initialize the Kubernetes control plane
  ansible.builtin.command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --apiserver-advertise-address={{ ansible_host }}
  args:
    creates: /etc/kubernetes/admin.conf
  register: kubeadm_init

- name: Show kubeadm init output
  ansible.builtin.debug:
    var: kubeadm_init.stdout_lines
  when: kubeadm_init.changed

- name: Create .kube directory for the ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Install kubeconfig for the ubuntu user
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Install the Tigera (Calico) operator
  ansible.builtin.command: >
    kubectl apply --server-side
    -f https://raw.githubusercontent.com/projectcalico/calico/v3.30.0/manifests/tigera-operator.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Write the Calico installation config
  ansible.builtin.copy:
    dest: /root/calico-installation.yaml
    content: |
      apiVersion: operator.tigera.io/v1
      kind: Installation
      metadata:
        name: default
      spec:
        calicoNetwork:
          ipPools:
            - name: default-ipv4-ippool
              cidr: 10.244.0.0/16
              encapsulation: VXLANCrossSubnet
              natOutgoing: Enabled
              nodeSelector: all()

- name: Apply the Calico installation
  ansible.builtin.command: kubectl apply -f /root/calico-installation.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_apply
  until: calico_apply.rc == 0
  retries: 5
  delay: 10
  changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"

- name: Generate a worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: join_command_raw
  changed_when: false

- name: Save the join command as a fact
  ansible.builtin.set_fact:
    join_command: "{{ join_command_raw.stdout }}"